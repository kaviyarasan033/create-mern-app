version: '3.8'

services:
  backend:
    build: ./server
    ports:
      - '5000:5000'
    environment:
      - NODE_ENV=development
      - MONGODB_URI=mongodb://mongodb:27017/proapp
    depends_on:
      - mongodb

  frontend:
    build: ./client
    ports:
      - '3000:3000'
    environment:
      - REACT_APP_API_URL=http://localhost:5000

  mongodb:
    image: mongo:5.0
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
